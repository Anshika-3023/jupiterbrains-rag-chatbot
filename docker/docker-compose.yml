version: "3.9"

services:
  rag-chatbot:
    build:
      context: ..          # project root
      dockerfile: docker/Dockerfile
    image: jupiterbrains-rag-chatbot:latest
    container_name: rag-chatbot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── Required ─────────────────────────────────────────────────────────────
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      # ── Optional overrides ────────────────────────────────────────────────────
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - REPLICATE_MODEL=${REPLICATE_MODEL:-meta/meta-llama-3-70b-instruct}
      - TOP_K=${TOP_K:-4}
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-80}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.2}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-512}
    volumes:
      # Persist ChromaDB between container restarts
      - chroma_data:/app/chroma_db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  chroma_data:
    driver: local

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JupiterBrains — RAG Test Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070e;--s1:#0f0f1a;--s2:#141424;--s3:#1b1b2e;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);
  --accent:#7c6aff;--adim:rgba(124,106,255,.15);--accent2:#a78bfa;
  --green:#34d399;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;
  --text:#dcdcf0;--muted:#55556a;--muted2:#8888a8;
  --head:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--mono);font-size:12.5px;background:var(--bg);color:var(--text);line-height:1.5;}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(124,106,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,255,.025) 1px,transparent 1px);
  background-size:48px 48px;
}
.shell{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:280px 1fr 320px;
  grid-template-rows:54px 1fr;
  grid-template-areas:"bar bar bar""left mid right";
  height:100vh;
}
/* TOP BAR */
.topbar{
  grid-area:bar;display:flex;align-items:center;gap:14px;
  padding:0 20px;border-bottom:1px solid var(--border);
  background:rgba(7,7,14,.92);backdrop-filter:blur(12px);
}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--head);font-weight:800;font-size:15px;letter-spacing:-.03em;color:#fff;white-space:nowrap;}
.logo-orb{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#4f3dc8);display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 0 12px rgba(124,106,255,.5);}
.logo em{color:var(--accent2);font-style:normal;}
.pill{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;background:var(--s3);border:1px solid var(--border2);color:var(--muted2);padding:3px 9px;border-radius:20px;}
.bar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.url-field{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:5px 12px;transition:border-color .2s;}
.url-field:focus-within{border-color:rgba(124,106,255,.4);}
.url-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
#apiUrl{background:transparent;border:none;outline:none;font-family:var(--mono);font-size:11.5px;color:var(--accent2);width:180px;}
.status{display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s,box-shadow .3s;}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:glow 2s infinite;}
.dot.err{background:var(--red);box-shadow:0 0 8px var(--red);}
@keyframes glow{0%,100%{box-shadow:0 0 6px var(--green);}50%{box-shadow:0 0 14px var(--green);}}
.status-txt{font-size:10.5px;color:var(--muted2);}
/* LEFT */
.left{grid-area:left;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.pblock{padding:14px 16px;border-bottom:1px solid var(--border);}
.pblock.fill{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.sec-head{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border);}
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.hcard{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.hcard-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px;}
.hcard-val{font-family:var(--head);font-size:20px;font-weight:700;color:var(--text);}
.hcard-val.ok{color:var(--green);}.hcard-val.err{color:var(--red);}.hcard-val.warn{color:var(--yellow);}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.scard{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 10px;text-align:center;}
.scard-num{font-family:var(--head);font-size:18px;font-weight:700;color:var(--accent2);}
.scard-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:1px;}
.clear-btn{width:100%;margin-top:8px;background:transparent;border:1px solid var(--border2);border-radius:7px;padding:7px;font-family:var(--mono);font-size:10.5px;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:.08em;transition:border-color .15s,color .15s;}
.clear-btn:hover{border-color:var(--red);color:var(--red);}
.q-scroll{flex:1;overflow-y:auto;min-height:0;}
.q-scroll::-webkit-scrollbar{width:3px;}.q-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.q-cat{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:10px 4px 5px;}
.q-btn{display:flex;align-items:flex-start;gap:6px;width:100%;background:transparent;border:1px solid transparent;border-radius:7px;padding:7px 8px;text-align:left;font-family:var(--mono);font-size:11.5px;color:var(--muted2);cursor:pointer;line-height:1.4;transition:all .15s;}
.q-btn::before{content:'›';color:var(--accent);font-size:13px;flex-shrink:0;margin-top:-1px;}
.q-btn:hover{background:rgba(124,106,255,.07);border-color:rgba(124,106,255,.18);color:var(--text);}
/* MID */
.mid{grid-area:mid;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:22px 20px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;}
.chat-msgs::-webkit-scrollbar{width:4px;}.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:40px;color:var(--muted);}
.empty-glyph{font-size:52px;opacity:.3;filter:grayscale(1);}
.empty-title{font-family:var(--head);font-size:17px;font-weight:700;color:var(--muted2);}
.empty-sub{font-size:12px;line-height:1.6;max-width:260px;}
.row{display:flex;gap:10px;animation:rowIn .22s cubic-bezier(.22,1,.36,1);}
@keyframes rowIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.row.user{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
.row.bot .av{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);}
.row.user .av{background:rgba(124,106,255,.15);border:1px solid rgba(124,106,255,.25);}
.msg-wrap{max-width:76%;display:flex;flex-direction:column;gap:4px;}
.row.user .msg-wrap{align-items:flex-end;}
.bubble{padding:11px 15px;border-radius:13px;font-size:13px;line-height:1.65;word-break:break-word;}
.row.bot .bubble{background:var(--s2);border:1px solid var(--border2);color:var(--text);border-top-left-radius:3px;}
.row.user .bubble{background:rgba(124,106,255,.15);border:1px solid rgba(124,106,255,.22);color:var(--text);border-top-right-radius:3px;}
.bubble.err{color:var(--red);}
.meta{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:7px;}
.ms-badge{color:var(--accent2);}
.sources{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.src-tag{font-size:9.5px;font-family:var(--mono);background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.18);color:var(--accent2);padding:2px 7px;border-radius:4px;}
.typing-bub{display:flex;gap:5px;align-items:center;padding:13px 16px;}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:tbounce 1.2s ease-in-out infinite;}
.tdot:nth-child(2){animation-delay:.18s;}.tdot:nth-child(3){animation-delay:.36s;}
@keyframes tbounce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-7px);opacity:1;}}
.input-bar{padding:14px 20px 18px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:flex-end;background:rgba(7,7,14,.7);backdrop-filter:blur(10px);flex-shrink:0;}
.input-wrap{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:11px;padding:9px 14px;display:flex;align-items:flex-end;gap:6px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:rgba(124,106,255,.4);}
#chatInput{flex:1;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:13px;color:var(--text);resize:none;max-height:90px;line-height:1.5;}
#chatInput::placeholder{color:var(--muted);}
.send{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#4f3dc8);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;flex-shrink:0;box-shadow:0 4px 14px rgba(124,106,255,.35);color:#fff;font-size:16px;}
.send:hover:not(:disabled){transform:scale(1.08);}
.send:disabled{background:var(--s3);box-shadow:none;cursor:not-allowed;opacity:.5;}
/* RIGHT */
.right{grid-area:right;display:flex;flex-direction:column;overflow:hidden;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;padding:12px 6px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);cursor:pointer;transition:all .15s;}
.tab.on{color:var(--accent2);border-bottom-color:var(--accent);}
.tab:hover:not(.on){color:var(--text);}
.pane{display:none;flex:1;overflow-y:auto;padding:14px;flex-direction:column;gap:10px;}
.pane.on{display:flex;}
.pane::-webkit-scrollbar{width:3px;}.pane::-webkit-scrollbar-thumb{background:var(--border2);}
.pane-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:4px;}
.json{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:10.5px;line-height:1.65;white-space:pre-wrap;word-break:break-all;color:var(--muted2);}
.jk{color:var(--accent2);}.js{color:var(--green);}.jn{color:var(--yellow);}.jb2{color:var(--orange);}.jnull{color:var(--muted);}
.t-card{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
.t-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}.t-row:last-child{margin-bottom:0;}
.t-lbl{font-size:10.5px;color:var(--muted2);width:72px;flex-shrink:0;}
.t-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.t-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .5s ease;}
.t-val{font-size:10.5px;color:var(--text);width:44px;text-align:right;}
.h-item{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:border-color .15s;}
.h-item:hover{border-color:rgba(124,106,255,.35);}
.h-q{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.h-meta{font-size:9.5px;color:var(--muted);display:flex;gap:7px;align-items:center;}
.h-ms{background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.15);color:var(--accent2);padding:1px 6px;border-radius:3px;font-size:9px;}
.ei{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);padding:40px 20px;text-align:center;font-size:11px;}
.ei-icon{font-size:34px;opacity:.25;}
*{scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
@media(max-width:1080px){.shell{grid-template-columns:250px 1fr;grid-template-areas:"bar bar""left mid";}.right{display:none;}}
@media(max-width:680px){.shell{grid-template-columns:1fr;grid-template-areas:"bar""mid";}.left{display:none;}}
</style>
</head>
<body>
<div class="shell">

<header class="topbar">
  <div class="logo"><div class="logo-orb">🪐</div>Jupiter<em>Brains</em></div>
  <div class="pill">RAG · Dev Console</div>
  <div class="bar-right">
    <div class="url-field">
      <span class="url-label">API</span>
      <input id="apiUrl" value="http://localhost:8000" spellcheck="false" autocomplete="off">
    </div>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span class="status-txt" id="statusTxt">checking…</span>
    </div>
  </div>
</header>

<aside class="left">
  <div class="pblock">
    <div class="sec-head">API Health</div>
    <div class="hgrid">
      <div class="hcard"><div class="hcard-lbl">Status</div><div class="hcard-val" id="hStatus">—</div></div>
      <div class="hcard"><div class="hcard-lbl">Docs Indexed</div><div class="hcard-val" id="hDocs">—</div></div>
    </div>
  </div>
  <div class="pblock">
    <div class="sec-head">Session</div>
    <div class="sgrid">
      <div class="scard"><div class="scard-num" id="sMsgs">0</div><div class="scard-lbl">Msgs</div></div>
      <div class="scard"><div class="scard-num" id="sAvg">—</div><div class="scard-lbl">Avg ms</div></div>
      <div class="scard"><div class="scard-num" id="sReqs">0</div><div class="scard-lbl">Reqs</div></div>
    </div>
    <button class="clear-btn" id="clearBtn">⌫ Clear Chat</button>
  </div>
  <div class="pblock fill">
    <div class="sec-head">Suggested Questions</div>
    <div class="q-scroll" id="qList"></div>
  </div>
</aside>

<main class="mid">
  <div class="chat-msgs" id="msgs">
    <div class="empty" id="emptyState">
      <div class="empty-glyph">🪐</div>
      <div class="empty-title">Ready to test</div>
      <div class="empty-sub">Pick a question from the left panel or type your own below.</div>
    </div>
  </div>
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="chatInput" rows="1" placeholder="Ask anything about JupiterBrains…"></textarea>
    </div>
    <button class="send" id="sendBtn" title="Send (Enter)">➤</button>
  </div>
</main>

<aside class="right">
  <div class="tab-bar">
    <button class="tab on"  onclick="switchTab('resp')">Response</button>
    <button class="tab"     onclick="switchTab('time')">Timing</button>
    <button class="tab"     onclick="switchTab('hist')">History</button>
  </div>
  <div class="pane on" id="pane-resp"><div class="ei"><div class="ei-icon">◎</div>Raw API response appears here</div></div>
  <div class="pane"    id="pane-time"><div class="ei"><div class="ei-icon">⏱</div>Timing data after first request</div></div>
  <div class="pane"    id="pane-hist"><div class="ei" id="histEmpty"><div class="ei-icon">📋</div>No history yet</div></div>
</aside>

</div>
<script>
var msgCount=0,totalMs=0,reqCount=0,loading=false,hist=[];
var QUESTIONS=[
  {cat:"Products",        qs:["What products does JupiterBrains offer?","What is the Email and Document Automation Platform?","What is LUMO?","What are Custom AI Agents?"]},
  {cat:"Industries",      qs:["What industries do you support?","How do you help BFSI clients?","Do you work with government clients?","What healthcare use cases do you support?"]},
  {cat:"Pricing",         qs:["Do you charge per API call?","What is your money-back guarantee?","Is there a free POC option?","What does the POC include?"]},
  {cat:"Technical",       qs:["How is the AI deployed?","What hardware is required?","How do you ensure data privacy?","What is your classification accuracy?"]},
  {cat:"Implementation",  qs:["How long does implementation take?","What is included in the POC phase?","What does a full enterprise deployment look like?"]},
  {cat:"Startups",        qs:["Do you have a startup program?","How does the partner program work?","Can a startup get co-investment?"]},
  {cat:"Edge Cases",      qs:["What is the stock price of JupiterBrains?","Who is the CEO of Google?","What is the weather today?"]},
];
var qList=document.getElementById('qList');
QUESTIONS.forEach(function(g){
  var c=document.createElement('div');c.className='q-cat';c.textContent=g.cat;qList.appendChild(c);
  g.qs.forEach(function(q){
    var b=document.createElement('button');b.className='q-btn';b.textContent=q;
    b.onclick=function(){fillAndSend(q);};qList.appendChild(b);
  });
});
function apiUrl(){return document.getElementById('apiUrl').value.replace(/\/$/,'');}
async function checkHealth(){
  var dot=document.getElementById('dot'),txt=document.getElementById('statusTxt');
  try{
    var r=await fetch(apiUrl()+'/health'),d=await r.json();
    dot.className='dot on';txt.textContent='online';
    setH('hStatus',d.status==='ok'?'OK':'ERR',d.status==='ok'?'ok':'err');
    var n=d.documents_indexed||0;setH('hDocs',n,n>0?'ok':'warn');
  }catch(e){
    dot.className='dot err';txt.textContent='offline';
    setH('hStatus','ERR','err');setH('hDocs','—','');
  }
}
function setH(id,v,c){var e=document.getElementById(id);e.textContent=v;e.className='hcard-val'+(c?' '+c:'');}
checkHealth();setInterval(checkHealth,15000);
document.getElementById('apiUrl').addEventListener('change',checkHealth);
function fillAndSend(q){document.getElementById('chatInput').value=q;sendMessage();}
document.getElementById('sendBtn').onclick=sendMessage;
document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
document.getElementById('chatInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px';});
document.getElementById('clearBtn').onclick=clearChat;
async function sendMessage(){
  if(loading)return;
  var inp=document.getElementById('chatInput'),q=inp.value.trim();if(!q)return;
  inp.value='';inp.style.height='auto';
  loading=true;document.getElementById('sendBtn').disabled=true;
  var es=document.getElementById('emptyState');if(es)es.remove();
  addUser(q);var ty=addTyping();var t0=performance.now();
  try{
    var res=await fetch(apiUrl()+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    var ms=Math.round(performance.now()-t0);ty.remove();
    if(!res.ok){
      var er=await res.json().catch(function(){return{};});
      addBot('Error '+res.status+': '+(er.detail||'Unknown'),[],ms,null,true);
      updateInspector({error:er,status:res.status},ms,q,res.status);
    }else{
      var d=await res.json();
      addBot(d.answer||'No answer returned.',d.sources||[],ms,d,false);
      updateInspector(d,ms,q,res.status);
      addHist(q,ms,d.sources||[]);
    }
    totalMs+=ms;reqCount++;
    document.getElementById('sAvg').textContent=Math.round(totalMs/reqCount);
    document.getElementById('sReqs').textContent=reqCount;
  }catch(err){
    var ms2=Math.round(performance.now()-t0);ty.remove();
    addBot('Cannot reach API at '+apiUrl()+'. Is the server running?',[],ms2,null,true);
    updateInspector({error:err.message},ms2,q,null);
  }
  loading=false;document.getElementById('sendBtn').disabled=false;document.getElementById('chatInput').focus();
}
function addUser(text){
  msgCount++;document.getElementById('sMsgs').textContent=msgCount;
  var row=document.createElement('div');row.className='row user';
  row.innerHTML='<div class="av">👤</div><div class="msg-wrap"><div class="bubble">'+esc(text)+'</div><div class="meta">'+ts()+'</div></div>';
  document.getElementById('msgs').appendChild(row);scroll();
}
function addBot(text,sources,ms,raw,isErr){
  msgCount++;document.getElementById('sMsgs').textContent=msgCount;
  var sh=sources.length?'<div class="sources">'+sources.map(function(s){return'<span class="src-tag">'+esc(s)+'</span>';}).join('')+'</div>':'';
  var row=document.createElement('div');row.className='row bot';
  row.innerHTML='<div class="av">🪐</div><div class="msg-wrap"><div class="bubble'+(isErr?' err':'')+'">'+esc(text)+'</div>'+sh+'<div class="meta">'+ts()+(ms!=null?'<span class="ms-badge">⚡ '+ms+'ms</span>':'')+'</div></div>';
  document.getElementById('msgs').appendChild(row);scroll();
}
function addTyping(){
  var row=document.createElement('div');row.className='row bot';
  row.innerHTML='<div class="av">🪐</div><div class="msg-wrap"><div class="bubble"><div class="typing-bub"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div></div></div>';
  document.getElementById('msgs').appendChild(row);scroll();return row;
}
function clearChat(){
  document.getElementById('msgs').innerHTML='<div class="empty" id="emptyState"><div class="empty-glyph">🪐</div><div class="empty-title">Ready to test</div><div class="empty-sub">Pick a question from the left or type your own.</div></div>';
  msgCount=0;totalMs=0;reqCount=0;
  document.getElementById('sMsgs').textContent='0';
  document.getElementById('sAvg').textContent='—';
  document.getElementById('sReqs').textContent='0';
}
function updateInspector(data,ms,q,status){
  document.getElementById('pane-resp').innerHTML='<div><div class="pane-lbl">Request</div><div class="json">'+hlj(JSON.stringify({question:q},null,2))+'</div></div><div><div class="pane-lbl">Response · '+(status||'ERR')+' · '+ms+'ms</div><div class="json">'+hlj(JSON.stringify(data,null,2))+'</div></div>';
  var allMs=hist.map(function(h){return h.ms;}),mx=Math.max.apply(null,allMs.concat([ms,1]));
  var avg=reqCount?Math.round(totalMs/reqCount):ms;
  var best=allMs.length?Math.min.apply(null,allMs):ms;
  var worst=allMs.length?Math.max.apply(null,allMs):ms;
  document.getElementById('pane-time').innerHTML='<div class="t-card"><div class="pane-lbl" style="margin-bottom:10px">Request timing</div>'+tr('This req',ms,mx,'var(--accent)')+(reqCount>1?tr('Avg',avg,mx,'var(--yellow)')+tr('Best',best,mx,'var(--green)')+tr('Worst',worst,mx,'var(--red)'):'')+'</div>';

function tr(l,v,m,c){return'<div class="t-row"><span class="t-lbl">'+l+'</span><div class="t-track"><div class="t-fill" style="width:'+Math.round(v/m*100)+'%;background:'+c+'"></div></div><span class="t-val">'+v+'ms</span></div>';}
function addHist(q,ms,sources){
  hist.unshift({q:q,ms:ms,sources:sources});
  var e=document.getElementById('histEmpty');if(e)e.remove();
  var item=document.createElement('div');item.className='h-item';
  item.innerHTML='<div class="h-q">'+esc(q)+'</div><div class="h-meta"><span>'+ts()+'</span><span class="h-ms">⚡ '+ms+'ms</span>'+(sources.length?'<span>'+sources.length+' src</span>':'')+'</div>';
  item.onclick=function(){fillAndSend(q);};
  var p=document.getElementById('pane-hist');p.insertBefore(item,p.firstChild);
}
function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('on',['resp','time','hist'][i]===name);});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('on',p.id==='pane-'+name);});
}
function scroll(){var m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
function ts(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hlj(json){
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,function(m){
    var c='jn';
    if(/^"/.test(m))c=/:$/.test(m)?'jk':'js';
    else if(/true|false/.test(m))c='jb2';
    else if(/null/.test(m))c='jnull';
    return'<span class="'+c+'">'+m+'</span>';
  });
}
